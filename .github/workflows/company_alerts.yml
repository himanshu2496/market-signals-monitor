name: Company Intelligence Summary (6-Hour)

on:
  schedule:
    # Every 6 hours: 00:30, 06:30, 12:30, 18:30 UTC
    - cron: "30 */6 * * *"
  workflow_dispatch:

jobs:
  company-alerts:
    name: Fetch priority company signals and alert Slack
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run company 6-hour summary
        env:
          SLACK_WEBHOOK_INTEL: ${{ secrets.SLACK_WEBHOOK_INTEL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: python fetch_company_intel.py --mode alerts
