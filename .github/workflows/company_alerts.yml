name: Company Intelligence Alerts (Priority)

on:
  schedule:
    # Every 2 hours at :30 UTC (offset from industry monitor to spread load)
    - cron: "30 */2 * * *"
  workflow_dispatch:

jobs:
  company-alerts:
    name: Fetch priority company signals and alert Slack
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run company alerts monitor
        env:
          SLACK_WEBHOOK_INTEL: ${{ secrets.SLACK_WEBHOOK_INTEL }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_company_intel.py --mode alerts
